# 1. Define a porta onde o servidor vai rodar
server.port=8080

# 2. Ativa a interface visual do banco de dados (acesso via /h2-console)
spring.h2.console.enabled=true

# 3. Configura o banco de dados para rodar na memória RAM (rápido para testes)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 4. Faz o Hibernate (JPA) criar as tabelas no banco automaticamente baseado nas suas classes Java
spring.jpa.hibernate.ddl-auto=update